# Manually launch a Cursor cloud agent to apply schema override issues in one PR.
# Issue titles must start with [missing-inheritance] or [risky-typecombo].
# Actions → Cursor override automation → Run workflow → pick the audit kind.
# See .agents/skills/apply-schema-override/SKILL.md
name: Cursor override automation

on:
  workflow_dispatch:
    inputs:
      kind:
        description: Override kind (all open issues with this title prefix are processed in one PR)
        required: true
        type: choice
        options:
          - missing-inheritance
          - risky-typecombo

permissions:
  issues: write
  pull-requests: read

jobs:
  launch-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Launch Cursor cloud agent via API
        run: bun run .github/scripts/cursorOverrideAutomation.ts
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          BATCH_OVERRIDE_KIND: ${{ github.event.inputs.kind }}
