# Launch a Cursor cloud agent for schema override issues (manual only while batch audit PR merges).
# Issue title must start with [missing-inheritance] or [risky-typecombo].
# Auto-run on issue open / post-merge queue is paused until #213 lands.
# Manual restart: Actions → Cursor override automation → Run workflow.
# See .agents/skills/apply-schema-override/SKILL.md
name: Cursor override automation

on:
  workflow_dispatch:
    inputs:
      issue_numbers:
        description: Comma-separated issue numbers (empty = launch the next queued override issue)
        required: false
        type: string

permissions:
  issues: write
  pull-requests: read

jobs:
  launch-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Launch Cursor cloud agent via API
        run: bun run .github/scripts/cursorOverrideAutomation.ts
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          RESTART_SCHEMA_OVERRIDE_ISSUES: 'true'
          ISSUE_NUMBERS: ${{ github.event.inputs.issue_numbers }}
