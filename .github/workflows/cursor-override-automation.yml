# Launch a Cursor cloud agent when a schema override issue is opened.
# Issue title must start with [missing-inheritance] or [risky-typecombo].
# Only one schema-override PR is processed at a time; the next issue launches after merge.
# Manual batch restart: Actions → Cursor override automation → Run workflow.
# See .agents/skills/apply-schema-override/SKILL.md
name: Cursor override automation

on:
  issues:
    types: [opened]
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      issue_numbers:
        description: Comma-separated issue numbers (empty = launch the next queued override issue)
        required: false
        type: string

permissions:
  issues: write
  pull-requests: read

jobs:
  launch-agent:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issues' &&
        (
          startsWith(github.event.issue.title, '[missing-inheritance]') ||
          startsWith(github.event.issue.title, '[risky-typecombo]')
        )
      ) ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.merged == true &&
        contains(github.event.pull_request.labels.*.name, 'schema-override')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Launch Cursor cloud agent via API
        run: bun run .github/scripts/cursorOverrideAutomation.ts
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          RESTART_SCHEMA_OVERRIDE_ISSUES: ${{ github.event_name == 'workflow_dispatch' }}
          LAUNCH_NEXT_SCHEMA_OVERRIDE: ${{ github.event_name == 'pull_request' && github.event.pull_request.merged }}
          ISSUE_NUMBERS: ${{ github.event.inputs.issue_numbers }}
