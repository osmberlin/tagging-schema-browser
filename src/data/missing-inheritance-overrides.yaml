# Intentional omissions of slash-parent `fields` / `moreFields` inheritance.
#
# Add an entry when a preset deliberately defines an explicit field list without
# `{parent}` and without inheriting some parent fields. Record `missedFieldIds`
# as a snapshot — CI fails when the live schema no longer matches (stale override).
#
# CI validates against the published npm release dist (see validate-inheritance-overrides).
#
# Example from id-tagging-schema: tourism/information/terminal.json lists only
# `operator` in fields (not `{tourism/information}`) while moreFields inherits
# from the parent via `{tourism/information}`.
#
#   tourism/information/terminal:
#     fields:
#       parentId: tourism/information
#       missedFieldIds:
#         - address
#         - building_area_yes
version: 1
presets:
  tourism/information/terminal:
    fields:
      parentId: tourism/information
      missedFieldIds:
        - address
        - building_area_yes
  man_made/adit:
    moreFields:
      parentId: man_made
      missedFieldIds:
        - material
