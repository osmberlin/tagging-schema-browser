# Skip Netlify deploy previews when a PR does not need a UI preview:
# - Dependabot bumps (deps-only)
# - Commits tagged [skip netlify]
# - Schema override PRs that only touch src/data/*-overrides.yaml
# Production deploys (GitHub Pages) are unaffected — deploy-preview only.
[context.deploy-preview]
ignore = "bash scripts/netlify-deploy-preview-ignore.sh"
