# Triggers a Cursor cloud agent when a schema override issue is opened.
# See .github/CURSOR_OVERRIDE_AUTOMATION.md
name: Cursor override automation

on:
  issues:
    types: [opened, labeled]
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cursor-override-automation.yml'
      - '.github/scripts/**'

permissions:
  issues: write

jobs:
  validate-workflow-on-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Workflow file check (push validation only)
        run: echo "Cursor override automation runs on issues with label cursor-override or a kind label."

  post-cursor-trigger:
    if: |
      github.event_name == 'issues' && (
        (github.event.action == 'opened' && (
          contains(github.event.issue.labels.*.name, 'cursor-override') ||
          contains(github.event.issue.labels.*.name, 'missing-inheritance-override') ||
          contains(github.event.issue.labels.*.name, 'risky-typecombo-override')
        )) ||
        (github.event.action == 'labeled' && (
          github.event.label.name == 'cursor-override' ||
          github.event.label.name == 'missing-inheritance-override' ||
          github.event.label.name == 'risky-typecombo-override'
        ))
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Start Cursor agent via issue comment
        run: bun run .github/scripts/cursorOverrideAutomation.ts
        env:
          GITHUB_TOKEN: ${{ github.token }}

  issue-noop:
    if: |
      github.event_name == 'issues' && !(
        (github.event.action == 'opened' && (
          contains(github.event.issue.labels.*.name, 'cursor-override') ||
          contains(github.event.issue.labels.*.name, 'missing-inheritance-override') ||
          contains(github.event.issue.labels.*.name, 'risky-typecombo-override')
        )) ||
        (github.event.action == 'labeled' && (
          github.event.label.name == 'cursor-override' ||
          github.event.label.name == 'missing-inheritance-override' ||
          github.event.label.name == 'risky-typecombo-override'
        ))
      )
    runs-on: ubuntu-latest
    steps:
      - name: No-op for other issue events
        run: echo "Issue event ignored (not a Cursor override trigger)."
