# Auto-merge schema override PRs from Cursor agents after CI passes.
# Rebase merge preserves 1–2 commits per PR (apply snapshot, optional stale cleanup).
name: Schema override auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to retry auto-merge for (must have schema-override label)
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: schema-override-auto-merge-${{ github.repository }}
  cancel-in-progress: false

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'schema-override')
    steps:
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            pr_number="${{ github.event.inputs.pr_number }}"
          else
            pr_number="${{ github.event.pull_request.number }}"
          fi
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          labels=$(gh pr view "$pr_number" --repo "${{ github.repository }}" --json labels --jq '[.labels[].name] | join(",")')
          if ! echo "$labels" | grep -q 'schema-override'; then
            echo "PR #$pr_number is missing schema-override label; exiting."
            exit 1
          fi
          draft=$(gh pr view "$pr_number" --repo "${{ github.repository }}" --json isDraft --jq '.isDraft')
          echo "draft=$draft" >> "$GITHUB_OUTPUT"

      - name: Fetch changed files
        id: files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          files=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename' | sort -u)
          echo "Changed files:"
          echo "$files"
          invalid=$(echo "$files" | grep -vE '^src/data/.*-overrides\.yaml$' || true)
          if [ -n "$invalid" ]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "Skipping auto-merge: PR touches files outside src/data/*-overrides.yaml"
            echo "$invalid"
            exit 0
          fi
          if [ -z "$files" ]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "Skipping auto-merge: no files changed"
            exit 0
          fi
          echo "eligible=true" >> "$GITHUB_OUTPUT"

      - name: Comment when manual review is required
        if: >-
          steps.files.outputs.eligible != 'true' &&
          (
            github.event_name == 'workflow_dispatch' ||
            contains(fromJSON('["opened", "labeled", "reopened"]'), github.event.action)
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body '🤖 **Schema override auto-merge skipped** — this PR must only change `src/data/*-overrides.yaml` and carry the `schema-override` label.'

      - name: Mark draft PR ready for review
        if: >-
          steps.files.outputs.eligible == 'true' &&
          steps.pr.outputs.draft == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          gh pr ready "$PR_NUMBER" --repo "${{ github.repository }}"
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body '🤖 **Schema override** — marked draft PR ready for review so auto-merge can proceed after CI.'

      - name: Update branch from main
        if: steps.files.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          gh pr update-branch "$PR_NUMBER" --repo "${{ github.repository }}" --rebase

      - name: Wait for CI, then rebase-merge
        id: automerge
        if: steps.files.outputs.eligible == 'true'
        uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ steps.pr.outputs.number }}
          MERGE_METHOD: rebase
          MERGE_COMMIT_MESSAGE: pull-request-title
          MERGE_DELETE_BRANCH: true
          MERGE_LABELS: schema-override
          MERGE_REQUIRED_APPROVALS: 0
          MERGE_FORKS: false
          MERGE_ERROR_FAIL: true

      - name: Checkout repository
        if: steps.files.outputs.eligible == 'true' && steps.automerge.outcome == 'success'
        uses: actions/checkout@v7

      - name: Setup Bun
        if: steps.files.outputs.eligible == 'true' && steps.automerge.outcome == 'success'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Close issues linked from PR body
        id: close-linked-issues
        # GITHUB_TOKEN merges do not trigger GitHub's native "Closes #X" closure.
        if: steps.files.outputs.eligible == 'true' && steps.automerge.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CLOSE_LINKED_ISSUES_FROM_PR: ${{ steps.pr.outputs.number }}
        run: bun run .github/scripts/cursorOverrideAutomation.ts

      - name: Comment when auto-merge is queued
        if: >-
          steps.files.outputs.eligible == 'true' &&
          steps.automerge.outcome == 'success' &&
          (
            github.event_name == 'workflow_dispatch' ||
            contains(fromJSON('["opened", "labeled", "reopened", "ready_for_review"]'), github.event.action)
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body '🤖 **Schema override auto-merge enabled** — this PR will rebase-merge once required checks pass (YAML-only override change; typically 1–2 commits).'

      - name: Comment when auto-merge fails
        if: >-
          steps.files.outputs.eligible == 'true' &&
          steps.automerge.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body '🤖 **Schema override auto-merge failed** — CI may still be running, the branch may be behind `main`, or checks are red. Re-run **Schema override auto-merge** from Actions after the current override PR has merged.'
