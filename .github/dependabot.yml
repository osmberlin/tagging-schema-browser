# Keep bundled icon libraries in sync with id-tagging-schema references.
# The schema loads at runtime from jsDelivr, but preset/field icons are resolved
# from npm packages vendored at build time — stale versions show as "broken" icons.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      icon-libraries:
        patterns:
          - "@enzet/roentgen"
          - "@mapbox/maki"
          - "@rapideditor/temaki"
        update-types:
          - minor
          - patch
