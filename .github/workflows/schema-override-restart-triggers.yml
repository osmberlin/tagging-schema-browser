# Launch Cursor cloud agents via API for open schema override issues (stage 1 restart).
name: Restart schema override agents

on:
  workflow_dispatch:
    inputs:
      issue_numbers:
        description: Comma-separated issue numbers (empty = all open override issues without an open PR)
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - '.github/triggers/restart-schema-override-triggers'

permissions:
  issues: write
  pull-requests: read

jobs:
  restart-agents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Launch Cursor cloud agents for override issues
        run: bun run .github/scripts/cursorOverrideAutomation.ts
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          RESTART_SCHEMA_OVERRIDE_ISSUES: 'true'
          ISSUE_NUMBERS: ${{ github.event.inputs.issue_numbers }}
