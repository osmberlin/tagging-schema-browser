# Triggers a Cursor cloud agent when a schema override issue is opened.
# Issue title must start with [missing-inheritance], [risky-typecombo], or [schema-override].
# See .agents/skills/apply-schema-override/SKILL.md
name: Cursor override automation

on:
  issues:
    types: [opened]
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cursor-override-automation.yml'
      - '.github/scripts/cursorOverrideAutomation.ts'

permissions:
  issues: write

jobs:
  validate-workflow-on-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Workflow file check (push validation only)
        run: echo "Cursor override automation runs on issues whose title starts with [missing-inheritance], [risky-typecombo], or [schema-override]."

  post-cursor-trigger:
    if: |
      github.event_name == 'issues' && (
        startsWith(github.event.issue.title, '[missing-inheritance]') ||
        startsWith(github.event.issue.title, '[risky-typecombo]') ||
        startsWith(github.event.issue.title, '[schema-override]')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Start Cursor agent via issue comment
        run: bun run .github/scripts/cursorOverrideAutomation.ts
        env:
          GITHUB_TOKEN: ${{ github.token }}

  issue-noop:
    if: |
      github.event_name == 'issues' && !(
        startsWith(github.event.issue.title, '[missing-inheritance]') ||
        startsWith(github.event.issue.title, '[risky-typecombo]') ||
        startsWith(github.event.issue.title, '[schema-override]')
      )
    runs-on: ubuntu-latest
    steps:
      - name: No-op for other issue events
        run: echo "Issue event ignored (not a Cursor override trigger)."
